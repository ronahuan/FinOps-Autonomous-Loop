---
- name: FinOps autonomous loop
  hosts: all
  sources:
    - name: finops_webhook
      ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Launch remediation workflow for approved recommendations
      condition: event.payload.stage == "proposed" and event.payload.decision == "approve"
      action:
        run_workflow_template:
          name: finops-remediation-workflow
          organization: Default
          job_args:
            extra_vars:
              cluster: "{{ event.payload.cluster }}"
              namespace: "{{ event.payload.namespace }}"
              workload: "{{ event.payload.workload }}"
              container: "{{ event.payload.container }}"
              current_cpu: "{{ event.payload.current.cpu_request }}"
              current_mem: "{{ event.payload.current.memory_request }}"
              rec_cpu: "{{ event.payload.recommended.cpu_request }}"
              rec_mem: "{{ event.payload.recommended.memory_request }}"
              cpu_req: "{{ event.payload.recommended.cpu_request }}"
              mem_req: "{{ event.payload.recommended.memory_request }}"
              expected_cpu: "{{ event.payload.current.cpu_request }}"
              expected_mem: "{{ event.payload.current.memory_request }}"
              saving: "{{ event.payload.monthly_saving_estimate }}"
              jira_ticket: "{{ event.payload.jira_ticket | default('') }}"
              jira_url: "{{ event.payload.jira_url | default('') }}"
