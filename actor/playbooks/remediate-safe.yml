# Patches a Deployment's REQUESTS only. module_defaults forces the scoped actor
# token on every k8s call (no kubeconfig fallback). Backs up the Deployment,
# verifies the rollout explicitly, and AUTO-ROLLS-BACK on any failure.
- name: Safe right-size remediation
  hosts: localhost
  connection: local
  gather_facts: false
  module_defaults:
    kubernetes.core.k8s:
      host: "{{ target_host }}"
      api_key: "{{ target_token }}"
      validate_certs: false
    kubernetes.core.k8s_info:
      host: "{{ target_host }}"
      api_key: "{{ target_token }}"
      validate_certs: false
  vars:
    _cluster_safe: "{{ cluster | default('') | upper | regex_replace('[^A-Z0-9]', '_') }}"
    target_host: >-
      {{ lookup('ansible.builtin.env', 'K8S_AUTH_HOST_' ~ _cluster_safe)
         if (_cluster_safe and lookup('ansible.builtin.env', 'K8S_AUTH_HOST_' ~ _cluster_safe))
         else lookup('ansible.builtin.env', 'K8S_AUTH_HOST') }}
    target_token: >-
      {{ lookup('ansible.builtin.env', 'K8S_AUTH_API_KEY_' ~ _cluster_safe)
         if (_cluster_safe and lookup('ansible.builtin.env', 'K8S_AUTH_API_KEY_' ~ _cluster_safe))
         else lookup('ansible.builtin.env', 'K8S_AUTH_API_KEY') }}
    rollout_timeout: 120
    out_dir: "{{ lookup('ansible.builtin.env', 'FINOPS_ACTOR_OUT') | default('/tmp/finops-actor/out', true) }}"
    backup_dir: "{{ out_dir }}/backups"
    force_fail_after_patch: false
    # required: namespace, workload, container, cpu_req, mem_req ; optional: saving, expected_cpu, expected_mem
  tasks:
    - name: SAFETY - required vars present
      ansible.builtin.assert:
        that:
          - namespace is defined
          - workload is defined
          - container is defined
          - cpu_req is defined
          - mem_req is defined
        fail_msg: "Missing required vars."

    - name: SAFETY - actor token present (else k8s could fall back to admin kubeconfig)
      ansible.builtin.assert:
        that:
          - target_token | length > 20
        fail_msg: "Actor token missing/short for cluster '{{ cluster | default('default') }}'. Refusing."

    - name: Read the target Deployment
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ namespace }}"
        name: "{{ workload }}"
      register: dep

    - name: Fail if Deployment missing
      ansible.builtin.assert:
        that:
          - dep.resources | length == 1
        fail_msg: "Deployment {{ namespace }}/{{ workload }} not found."

    - name: Fail if the target container is absent
      ansible.builtin.assert:
        that:
          - dep.resources[0].spec.template.spec.containers | selectattr('name','equalto', container) | list | length == 1
        fail_msg: "Container {{ container }} not found."

    - name: Capture original requests (rollback target)
      ansible.builtin.set_fact:
        orig_cpu: "{{ (dep.resources[0].spec.template.spec.containers | selectattr('name','equalto', container) | first).resources.requests.cpu }}"
        orig_mem: "{{ (dep.resources[0].spec.template.spec.containers | selectattr('name','equalto', container) | first).resources.requests.memory }}"

    - name: SAFETY - live config still matches the approved baseline (when provided by EDA)
      ansible.builtin.assert:
        that:
          - (expected_cpu is not defined) or (orig_cpu | string == expected_cpu | string)
          - (expected_mem is not defined) or (orig_mem | string == expected_mem | string)
        fail_msg: "Live requests changed since approval. Refusing stale remediation."

    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory

    - name: Back up the full Deployment before patching
      ansible.builtin.copy:
        dest: "{{ backup_dir }}/{{ namespace }}__{{ workload }}__{{ now(utc=true, fmt='%Y%m%dT%H%M%SZ') }}.json"
        content: "{{ dep.resources[0] | to_nice_json }}"

    - name: Patch + verify rollout, auto-rollback on failure
      block:
        - name: Patch requests only (limits untouched)
          kubernetes.core.k8s:
            state: patched
            wait: false
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata: { name: "{{ workload }}", namespace: "{{ namespace }}" }
              spec:
                template:
                  spec:
                    containers:
                      - name: "{{ container }}"
                        resources:
                          requests: { cpu: "{{ cpu_req }}", memory: "{{ mem_req }}" }

        - name: Verify the new rollout actually completed
          kubernetes.core.k8s_info:
            api_version: apps/v1
            kind: Deployment
            namespace: "{{ namespace }}"
            name: "{{ workload }}"
          register: rollout
          until:
            - rollout.resources | length == 1
            - (rollout.resources[0].status.observedGeneration | default(0)) >= (rollout.resources[0].metadata.generation | default(1))
            - (rollout.resources[0].status.updatedReplicas   | default(0)) == (rollout.resources[0].spec.replicas | default(1))
            - (rollout.resources[0].status.availableReplicas | default(0)) == (rollout.resources[0].spec.replicas | default(1))
            - (rollout.resources[0].status.unavailableReplicas | default(0)) == 0
          retries: "{{ (rollout_timeout | int) // 4 }}"
          delay: 4

        - name: DEMO ONLY - force a post-patch failure to exercise rollback
          ansible.builtin.fail:
            msg: "Forced post-patch failure (rollback demo)."
          when: force_fail_after_patch | default(false) | bool

        - name: Success
          ansible.builtin.debug:
            msg: "OK {{ namespace }}/{{ workload }} -> cpu {{ cpu_req }}, mem {{ mem_req }}"

        - name: Record savings to annotation
          kubernetes.core.k8s:
            state: patched
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: "{{ workload }}"
                namespace: "{{ namespace }}"
                annotations:
                  finops.redhat.com/last-saving: "{{ saving | default('0') }}"
                  finops.redhat.com/last-remediated: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
                  finops.redhat.com/patched-cpu: "{{ cpu_req }}"
                  finops.redhat.com/patched-mem: "{{ mem_req }}"
          when: saving is defined

        - name: Notify Slack of success
          ansible.builtin.uri:
            url: "{{ slack_webhook_url }}"
            method: POST
            body_format: json
            body:
              text: "FinOps Remediation Applied: {{ namespace }}/{{ workload }}"
              blocks:
                - type: header
                  text:
                    type: plain_text
                    text: "FinOps Remediation Applied"
                - type: section
                  fields:
                    - type: mrkdwn
                      text: "*Cluster:*\n{{ cluster | default('unknown') }}"
                    - type: mrkdwn
                      text: "*Workload:*\n{{ namespace }}/{{ workload }}"
                - type: section
                  fields:
                    - type: mrkdwn
                      text: "*New Requests:*\nCPU {{ cpu_req }}, Mem {{ mem_req }}"
                    - type: mrkdwn
                      text: "*Estimated Saving:*\n${{ saving | default('0') }}/mo"
            status_code: [200]
          failed_when: false
          when: slack_webhook_url is defined and slack_webhook_url | length > 0

      rescue:
        - name: ROLLBACK - restore original requests
          kubernetes.core.k8s:
            state: patched
            wait: true
            wait_timeout: "{{ rollout_timeout }}"
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata: { name: "{{ workload }}", namespace: "{{ namespace }}" }
              spec:
                template:
                  spec:
                    containers:
                      - name: "{{ container }}"
                        resources:
                          requests: { cpu: "{{ orig_cpu }}", memory: "{{ orig_mem }}" }

        - name: Suppress this workload for 7 days
          kubernetes.core.k8s:
            state: patched
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: "{{ workload }}"
                namespace: "{{ namespace }}"
                annotations:
                  finops.redhat.com/suppressed-until: "{{ '%Y-%m-%dT%H:%M:%SZ' | strftime(now(utc=true, fmt='%s') | int + 604800) }}"

        - name: Announce rollback
          ansible.builtin.debug:
            msg: "ROLLED BACK {{ namespace }}/{{ workload }} to cpu {{ orig_cpu }}, mem {{ orig_mem }}. Suppressed for 7 days."

        - name: Notify Slack of rollback
          ansible.builtin.uri:
            url: "{{ slack_webhook_url }}"
            method: POST
            body_format: json
            body:
              text: "FinOps Rollback: {{ namespace }}/{{ workload }}"
              blocks:
                - type: header
                  text:
                    type: plain_text
                    text: "FinOps Remediation Rolled Back"
                - type: section
                  fields:
                    - type: mrkdwn
                      text: "*Cluster:*\n{{ cluster | default('unknown') }}"
                    - type: mrkdwn
                      text: "*Workload:*\n{{ namespace }}/{{ workload }}"
                - type: section
                  fields:
                    - type: mrkdwn
                      text: "*Rolled Back To:*\nCPU {{ orig_cpu }}, Mem {{ orig_mem }}"
                    - type: mrkdwn
                      text: "*Suppressed:*\n7 days"
            status_code: [200]
          failed_when: false
          when: slack_webhook_url is defined and slack_webhook_url | length > 0

        - name: Mark the run failed
          ansible.builtin.fail:
            msg: "Remediation failed; rolled back."
