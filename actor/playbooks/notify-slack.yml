- name: Notify Slack of proposed right-sizing
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    approval_base_url: "{{ lookup('ansible.builtin.env', 'APPROVAL_SERVER_URL') | default('http://localhost:8085', true) }}"
    approve_link: "{{ approval_base_url }}/approve?namespace={{ namespace | urlencode }}&workload={{ workload | urlencode }}&container={{ container | urlencode }}&cluster={{ cluster | urlencode }}&current_cpu={{ current_cpu | urlencode }}&current_mem={{ current_mem | urlencode }}&rec_cpu={{ rec_cpu | urlencode }}&rec_mem={{ rec_mem | urlencode }}&saving={{ saving | urlencode }}"
    deny_link: "{{ approval_base_url }}/deny?namespace={{ namespace | urlencode }}&workload={{ workload | urlencode }}"
    # required: namespace, workload, container, cluster, current_cpu, current_mem, rec_cpu, rec_mem, saving, slack_webhook_url
  tasks:
    - name: Post Slack notification with approve/deny links
      ansible.builtin.uri:
        url: "{{ slack_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: "FinOps Right-Size Proposal: {{ namespace }}/{{ workload }}"
          blocks:
            - type: header
              text:
                type: plain_text
                text: "FinOps Right-Size Proposal"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Workload:*\n{{ namespace }}/{{ workload }}"
                - type: mrkdwn
                  text: "*Estimated Saving:*\n${{ saving }}/mo"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Current:*\nCPU {{ current_cpu }}, Mem {{ current_mem }}"
                - type: mrkdwn
                  text: "*Recommended:*\nCPU {{ rec_cpu }}, Mem {{ rec_mem }}"
            - type: section
              text:
                type: mrkdwn
                text: ":white_check_mark: <{{ approve_link }}|*Approve*>     :x: <{{ deny_link }}|*Deny*>"
        status_code: [200]
      failed_when: false
      when: slack_webhook_url | length > 0
