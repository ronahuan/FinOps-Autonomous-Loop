- name: Notify Slack of proposed right-sizing
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    proposal_key: "{{ cluster | default('unknown') }}__{{ namespace }}__{{ workload }}"
  tasks:
    - name: Post Slack notification with Approve/Deny buttons
      ansible.builtin.uri:
        url: "{{ slack_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: "FinOps Proposal: {{ namespace }}/{{ workload }}"
          blocks:
            - type: header
              text:
                type: plain_text
                text: "FinOps Right-Size Proposal"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Cluster:*\n{{ cluster | default('unknown') }}"
                - type: mrkdwn
                  text: "*Workload:*\n{{ namespace }}/{{ workload }}"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Estimated Saving:*\n${{ saving }}/mo"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Current:*\nCPU {{ current_cpu }}, Mem {{ current_mem }}"
                - type: mrkdwn
                  text: "*Recommended:*\nCPU {{ rec_cpu }}, Mem {{ rec_mem }}"
            - type: section
              text:
                type: mrkdwn
                text: "{{ ':ticket: Ticket: <' ~ jira_url ~ '/browse/' ~ jira_ticket ~ '|' ~ jira_ticket ~ '>' if jira_ticket | default('') | length > 0 else ':clipboard: No ticket' }}"
            - type: actions
              elements:
                - type: button
                  text:
                    type: plain_text
                    text: "Approve"
                  style: primary
                  action_id: finops_approve
                  value: "{{ proposal_key }}"
                - type: button
                  text:
                    type: plain_text
                    text: "Deny"
                  style: danger
                  action_id: finops_deny
                  value: "{{ proposal_key }}"
        status_code: [200]
      failed_when: false
      when: slack_webhook_url | length > 0
