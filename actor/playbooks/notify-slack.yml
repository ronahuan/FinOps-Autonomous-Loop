- name: Notify Slack of proposed right-sizing
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Post Slack notification
      ansible.builtin.uri:
        url: "{{ slack_webhook_url }}"
        method: POST
        body_format: json
        body:
          blocks:
            - type: header
              text:
                type: plain_text
                text: "FinOps Right-Size Proposal"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Cluster:*\n{{ cluster | default('unknown') }}"
                - type: mrkdwn
                  text: "*Workload:*\n{{ namespace }}/{{ workload }}"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Estimated Saving:*\n${{ saving }}/mo"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Current:*\nCPU {{ current_cpu }}, Mem {{ current_mem }}"
                - type: mrkdwn
                  text: "*Recommended:*\nCPU {{ rec_cpu }}, Mem {{ rec_mem }}"
            - type: section
              text:
                type: mrkdwn
                text: "<{{ aap_url | default('https://sandbox-aap-pm-ronahuan-dev.apps.rm2.thpm.p1.openshiftapps.com') }}/execution/administration/workflow-approvals|:white_check_mark: Click here to approve in AAP>"
        status_code: [200]
      failed_when: false
      when: slack_webhook_url | length > 0
